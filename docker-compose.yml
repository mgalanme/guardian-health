services:

  postgres:
    image: postgres:16-alpine
    container_name: guardian-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:latest
    container_name: guardian-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME}/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1G
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    container_name: guardian-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      disable: true

  solace:
    image: solace/solace-pubsub-standard:latest
    container_name: guardian-solace
    restart: unless-stopped
    environment:
      username_admin_globalaccesslevel: admin
      username_admin_password: ${SOLACE_ADMIN_PASSWORD:-guardian-solace-1234}
      system_scaling_maxconnectioncount: 100
    ports:
      - "8080:8080"
      - "55555:55555"
      - "8008:8008"
      - "1883:1883"
      - "5672:5672"
    volumes:
      - solace_data:/var/lib/solace
    shm_size: 1g
    ulimits:
      core:
        soft: 1
        hard: 1
      nofile:
        soft: 1048576
        hard: 1048576
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  qdrant_data:
  solace_data:
